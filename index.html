<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Für Karin & Joachim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #fff5e6 0%, #f3d5b5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Playfair Display', serif;
            color: #4a3728;
        }

        .card-container {
            width: 88%;
            max-width: 380px;
            background: #ffffff;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            padding: 40px 20px;
            text-align: center;
            border-radius: 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #d4af37;
            position: relative;
            outline: 15px solid rgba(255, 255, 255, 0.5);
            outline-offset: -25px;
        }

        .card-container::before { content: "❧"; position: absolute; top: 10px; left: 10px; color: #d4af37; font-size: 1.5rem; }
        .card-container::after { content: "☙"; position: absolute; bottom: 10px; right: 10px; color: #d4af37; font-size: 1.5rem; }

        .header-text { font-style: italic; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: #9c844a; margin-bottom: 10px; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; font-weight: normal; margin: 0; color: #8b0000; line-height: 1.2; }
        .names { font-size: 1.5rem; margin-bottom: 30px; color: #4a3728; }
        .divider { width: 60px; height: 2px; background: #d4af37; margin: 20px auto; }
        .main-text { font-size: 1.2rem; line-height: 1.6; margin: 20px 0; }

        .voucher-highlight {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            margin: 25px 0;
        }

        .voucher-title { font-weight: bold; display: block; margin-bottom: 5px; color: #8b4513; }
        .floating-heart { font-size: 2rem; color: #cd5c5c; animation: float 3s ease-in-out infinite; display: inline-block; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .footer-sig { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: #8b4513; margin-top: 20px; margin-bottom: 20px; }

        .audio-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fdfaf6;
            border: 1px solid #d4af37;
            padding: 10px 18px;
            border-radius: 30px;
            width: fit-content;
            margin: 10px auto 0 auto;
            font-family: sans-serif;
            font-size: 12px;
        }

        #playPauseBtn {
            background: #cd5c5c;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        input[type="range"] { cursor: pointer; accent-color: #cd5c5c; width: 70px; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="header-text">Herzliche Einladung</div>
        <h1>Alles Gute zum Geburtstag</h1>
        <div class="names">Karin & Joachim</div>
        <div class="floating-heart">♥</div>
        <div class="divider"></div>
        <div class="main-text">Wir möchten diesen besonderen Tag <br> mit euch gebührend feiern!</div>
        <div class="voucher-highlight">
            <span class="voucher-title">GUTSCHEIN</span>
            Ein gemeinsames Festessen mit <br> <strong>allen gebürtigen Töpkes</strong>
        </div>
        <div class="footer-sig">In Liebe</div>

        <audio id="myAudio" src="hb.mp3" loop autoplay></audio>

        <div class="audio-player">
            <button id="playPauseBtn">▶</button>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>Vol</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
            </div>
        </div>
        <div class="tenor-gif-embed" data-postid="5385155645387749769" data-share-method="host" data-aspect-ratio="1.06667" data-width="100%"><a href="https://tenor.com/view/peachy-celebrate-gif-5385155645387749769">Peachy Celebrate Sticker</a>from <a href="https://tenor.com/search/peachy-stickers">Peachy Stickers</a></div> <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

    <script>
        const audio = document.getElementById('myAudio');
        const btn = document.getElementById('playPauseBtn');
        const slider = document.getElementById('volumeSlider');

        // Direkt auf 1:13 springen
        audio.currentTime = 73;

        function updateUI() {
            if (audio.paused) {
                btn.innerHTML = '▶';
                btn.style.fontSize = '16px';
            } else {
                btn.innerHTML = '▌▌';
                btn.style.fontSize = '12px';
            }
        }

        // 1. Sofortiger Startversuch beim Laden
        window.addEventListener('DOMContentLoaded', () => {
            audio.play().then(updateUI).catch(() => {
                console.log("Browser verhindert Autoplay ohne Interaktion.");
            });
        });

        // 2. Backup: Startet bei der absolut kleinsten Bewegung
        const triggerAutoplay = () => {
            if (audio.paused) {
                audio.play().then(updateUI);
            }
        };

        window.addEventListener('mousedown', triggerAutoplay, { once: true });
        window.addEventListener('touchstart', triggerAutoplay, { once: true });
        window.addEventListener('keydown', triggerAutoplay, { once: true });

        // Manuelle Steuerung
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.paused) {
                audio.play().then(updateUI);
            } else {
                audio.pause();
                updateUI();
            }
        });

        slider.addEventListener('input', () => {
            audio.volume = slider.value;
        });
    </script>

    
</body>
</html>
